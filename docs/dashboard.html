<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      color: #e0e6ed;
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      background: rgba(15, 20, 31, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { font-size: 24px; font-weight: 800; color: #6366f1; }
    .header-stats { display: flex; gap: 40px; align-items: center; }
    .stat { text-align: right; }
    .stat-label { font-size: 11px; color: #8b92a9; text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #fff; }
    .stat-value.positive { color: #10b981; }
    .stat-value.negative { color: #ef4444; }

    .container { max-width: 1500px; margin: 0 auto; padding: 24px; }
    .section-header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid rgba(99, 102, 241, 0.2); }
    .section-title { font-size: 18px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; width: 4px; height: 20px; background: #6366f1; border-radius: 2px; }

    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .filter-btn { background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); color: #a5b4fc; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: rgba(26, 31, 44, 0.6); border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.3s ease; }
    .card:hover { background: rgba(26, 31, 44, 0.9); border-color: rgba(99, 102, 241, 0.4); transform: translateY(-2px); }
    .card.active { background: rgba(99, 102, 241, 0.15); border-color: #6366f1; }

    .symbol { font-size: 12px; font-weight: 700; color: #6366f1; text-transform: uppercase; margin-bottom: 6px; }
    .type { font-size: 10px; color: #8b92a9; text-transform: uppercase; margin-bottom: 8px; }
    .price { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .change { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .positive { color: #10b981; }
    .negative { color: #ef4444; }

    /* MODAL STYLES */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-overlay.active { display: flex; align-items: flex-end; justify-content: center; }

    .modal-content {
      background: linear-gradient(135deg, #1a1f2e 0%, #0f1419 100%);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-title-block {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .modal-title {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }

    .modal-subtitle {
      font-size: 13px;
      color: #8b92a9;
      margin-top: 4px;
    }

    .modal-close {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a5b4fc;
      font-size: 20px;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: rgba(99, 102, 241, 0.2);
      color: #6366f1;
    }

    .modal-body {
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .chart-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chart-container {
      background: rgba(26, 31, 44, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 12px;
      padding: 16px;
      min-height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b92a9;
    }

    .timeframe-selector {
      display: flex;
      gap: 8px;
    }

    .tf-btn {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .tf-btn:hover { background: rgba(99, 102, 241, 0.2); }
    .tf-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }

    .analysis-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .analysis-card {
      background: rgba(26, 31, 44, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 12px;
      padding: 16px;
    }

    .analysis-title {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .signal-indicator {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .signal-indicator.bearish {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .signal-icon {
      font-size: 20px;
      margin-right: 8px;
    }

    .signal-text {
      flex: 1;
    }

    .signal-label {
      font-size: 12px;
      font-weight: 700;
      color: #10b981;
    }

    .signal-indicator.bearish .signal-label { color: #ef4444; }

    .signal-value {
      font-size: 11px;
      color: #8b92a9;
      margin-top: 2px;
    }

    .signal-strength {
      font-size: 14px;
      font-weight: 700;
      color: #10b981;
    }

    .signal-indicator.bearish .signal-strength { color: #ef4444; }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric {
      background: rgba(20, 20, 30, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .metric-label {
      font-size: 10px;
      color: #8b92a9;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-buy {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
    }

    .btn-buy:hover { box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3); }

    .btn-sell {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
    }

    .btn-sell:hover { box-shadow: 0 8px 16px rgba(239, 68, 68, 0.3); }

    .positions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .position-card {
      background: rgba(26, 31, 44, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 12px;
      padding: 16px;
    }

    .position-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .pos-sym { font-size: 13px; font-weight: 700; color: #6366f1; text-transform: uppercase; }
    .pos-pnl { font-size: 13px; font-weight: 700; }
    .pos-pnl.profit { color: #10b981; }
    .pos-pnl.loss { color: #ef4444; }

    .pos-detail {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #8b92a9;
      margin-bottom: 4px;
    }

    .pos-value { color: #e0e6ed; font-weight: 600; }
    .empty { color: #8b92a9; padding: 40px; text-align: center; }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .header-stats { gap: 20px; font-size: 14px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .modal-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⬡ Trading Bot</div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-label">Portfolio</div>
        <div class="stat-value" id="portfolio">$100,000</div>
      </div>
      <div class="stat">
        <div class="stat-label">Today P&L</div>
        <div class="stat-value" id="pnl">+$0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Positions</div>
        <div class="stat-value" id="pos-count">0</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section-header">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div class="section-title">📊 All Assets</div>
        <div class="controls">
          <button class="filter-btn active" onclick="filterAssets('all')">All</button>
          <button class="filter-btn" onclick="filterAssets('stock')">Stocks</button>
          <button class="filter-btn" onclick="filterAssets('crypto')">Crypto</button>
        </div>
      </div>
    </div>
    <div class="grid" id="assets-grid"></div>

    <div class="section-header">
      <div class="section-title">💼 Open Positions</div>
    </div>
    <div class="positions-grid" id="positions-container"></div>
  </div>

  <!-- CHART MODAL -->
  <div class="modal-overlay" id="chart-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-block">
          <div>
            <div class="modal-title" id="modal-symbol">BTC/USD</div>
            <div class="modal-subtitle" id="modal-subtitle">Bitcoin / US Dollar</div>
          </div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="modal-body">
        <!-- LEFT: CHART -->
        <div class="chart-section">
          <div class="timeframe-selector">
            <button class="tf-btn active" onclick="changeTF(this, '5m')">5m</button>
            <button class="tf-btn" onclick="changeTF(this, '15m')">15m</button>
            <button class="tf-btn" onclick="changeTF(this, '1h')">1h</button>
            <button class="tf-btn" onclick="changeTF(this, '1d')">1d</button>
          </div>
          <div class="chart-container" id="chart-container">
            📈 Loading chart data...
          </div>
        </div>

        <!-- RIGHT: ANALYSIS -->
        <div class="analysis-section">
          <!-- SIGNAL STATUS -->
          <div class="analysis-card">
            <div class="analysis-title">⚡ Signal Status</div>
            <div id="signal-display"></div>
          </div>

          <!-- TECHNICAL INDICATORS -->
          <div class="analysis-card">
            <div class="analysis-title">📊 Technical Indicators</div>
            <div class="metric-grid">
              <div class="metric">
                <div class="metric-label">EMA 9</div>
                <div class="metric-value" id="metric-ema9">—</div>
              </div>
              <div class="metric">
                <div class="metric-label">EMA 21</div>
                <div class="metric-value" id="metric-ema21">—</div>
              </div>
              <div class="metric">
                <div class="metric-label">RSI</div>
                <div class="metric-value" id="metric-rsi">—</div>
              </div>
              <div class="metric">
                <div class="metric-label">ATR</div>
                <div class="metric-value" id="metric-atr">—</div>
              </div>
            </div>
          </div>

          <!-- PRICE INFO -->
          <div class="analysis-card">
            <div class="analysis-title">💰 Price Info</div>
            <div class="metric-grid">
              <div class="metric">
                <div class="metric-label">Current</div>
                <div class="metric-value" id="metric-current">$0</div>
              </div>
              <div class="metric">
                <div class="metric-label">Change</div>
                <div class="metric-value" id="metric-change">0%</div>
              </div>
              <div class="metric">
                <div class="metric-label">High</div>
                <div class="metric-value" id="metric-high">$0</div>
              </div>
              <div class="metric">
                <div class="metric-label">Low</div>
                <div class="metric-value" id="metric-low">$0</div>
              </div>
            </div>
          </div>

          <!-- ACTION BUTTONS -->
          <div class="action-buttons">
            <button class="btn btn-buy" onclick="openPosition('buy')">🟢 BUY</button>
            <button class="btn btn-sell" onclick="openPosition('sell')">🔴 SELL</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const ALP_KEY = localStorage.getItem('alpaca_key') || '';
    const ALP_SEC = localStorage.getItem('alpaca_secret') || '';
    const ALP_URL = 'https://paper-api.alpaca.markets';
    const DATA_URL = 'https://data.alpaca.markets';

    const STOCKS = ['COST', 'TSLA', 'META', 'GOOGL', 'AMZN', 'MSFT', 'NVDA', 'AAPL', 'NFLX'];
    const CRYPTOS = ['BTC/USD', 'ETH/USD', 'SOL/USD', 'XRP/USD', 'ADA/USD', 'DOGE/USD'];

    let assets = {};
    let positions = {};
    let currentFilter = 'all';
    let selectedAsset = null;
    let chart = null;
    let candlestickSeries = null;

    async function fetchStockQuotes() {
      try {
        const response = await fetch(
          `${ALP_URL}/v2/stocks/snapshots?symbols=${STOCKS.join(',')}`,
          { headers: { 'APCA-API-KEY-ID': ALP_KEY, 'APCA-API-SECRET-KEY': ALP_SEC } }
        );
        if (!response.ok) throw new Error('Stock API error');
        const data = await response.json();

        STOCKS.forEach(sym => {
          if (data[sym]?.latestTrade) {
            assets[sym] = {
              symbol: sym,
              type: 'stock',
              price: data[sym].latestTrade.p,
              change: 0
            };
          }
        });
      } catch (e) {
        console.log('Stock quote error:', e.message);
      }
    }

    async function fetchCryptoQuotes() {
      try {
        const response = await fetch(
          `${DATA_URL}/v1beta3/crypto/us/latest/quotes?symbols=${CRYPTOS.map(s => s.split('/')[0]).join(',')}`,
          { headers: { 'APCA-API-KEY-ID': ALP_KEY, 'APCA-API-SECRET-KEY': ALP_SEC } }
        );
        if (!response.ok) throw new Error('Crypto API error');
        const data = await response.json();

        if (data.quotes) {
          data.quotes.forEach(quote => {
            const sym = quote.symbol + '/USD';
            if (CRYPTOS.includes(sym)) {
              assets[sym] = {
                symbol: sym,
                type: 'crypto',
                price: quote.ap || quote.bp,
                change: 0
              };
            }
          });
        }
      } catch (e) {
        console.log('Crypto quote error:', e.message);
      }
    }

    async function loadPositions() {
      try {
        const response = await fetch('positions.json');
        if (response.ok) {
          positions = await response.json();
        }
      } catch (e) {
        console.log('Positions load error:', e.message);
      }
    }

    function renderAssets() {
      const filtered = Object.values(assets).filter(a =>
        currentFilter === 'all' || a.type === currentFilter
      );

      const html = filtered.map(asset => `
        <div class="card" onclick="openChart('${asset.symbol}', this)">
          <div class="symbol">${asset.symbol}</div>
          <div class="type">${asset.type}</div>
          <div class="price">$${asset.price.toLocaleString(undefined, { maximumFractionDigits: 2 })}</div>
          <div class="change">
            <span>${asset.change >= 0 ? '↑' : '↓'}</span>
            <span class="${asset.change >= 0 ? 'positive' : 'negative'}">${asset.change > 0 ? '+' : ''}${asset.change.toFixed(2)}%</span>
          </div>
        </div>
      `).join('');

      document.getElementById('assets-grid').innerHTML = html || '<div class="empty">Loading prices...</div>';
    }

    function renderPositions() {
      const html = Object.entries(positions).map(([sym, pos]) => {
        const current = assets[sym + '/USD']?.price || assets[sym]?.price || pos.entry;
        const pnl = current - pos.entry;
        const pnlPct = ((pnl / pos.entry) * 100).toFixed(2);

        return `
          <div class="position-card">
            <div class="position-header">
              <div class="pos-sym">${sym}</div>
              <div class="pos-pnl ${pnl >= 0 ? 'profit' : 'loss'}">
                ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}
              </div>
            </div>
            <div class="pos-detail"><span>Entry:</span><span class="pos-value">$${pos.entry.toLocaleString()}</span></div>
            <div class="pos-detail"><span>Current:</span><span class="pos-value">$${current.toLocaleString(undefined, { maximumFractionDigits: 2 })}</span></div>
            <div class="pos-detail"><span>SL:</span><span class="pos-value">$${pos.sl.toLocaleString(undefined, { maximumFractionDigits: 2 })}</span></div>
            <div class="pos-detail"><span>TP:</span><span class="pos-value">$${pos.tp.toLocaleString(undefined, { maximumFractionDigits: 2 })}</span></div>
            <div class="pos-detail"><span>Return:</span><span class="pos-value ${pnlPct >= 0 ? 'positive' : 'negative'}">${pnlPct >= 0 ? '+' : ''}${pnlPct}%</span></div>
          </div>
        `;
      }).join('');

      const container = document.getElementById('positions-container');
      container.innerHTML = html || '<div class="empty">No open positions</div>';
      document.getElementById('pos-count').textContent = Object.keys(positions).length;
    }

    function filterAssets(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
      renderAssets();
    }

    function openChart(symbol, element) {
      selectedAsset = symbol;
      document.getElementById('modal-symbol').textContent = symbol;
      document.getElementById('modal-subtitle').textContent = symbol.includes('/') ? 'Cryptocurrency' : 'Stock';
      document.getElementById('chart-modal').classList.add('active');

      // Update metrics
      const asset = assets[symbol];
      if (asset) {
        document.getElementById('metric-current').textContent = `$${asset.price.toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
        document.getElementById('metric-change').textContent = `${asset.change > 0 ? '+' : ''}${asset.change}%`;
      }

      // Sample signal display
      const signal = Math.random() > 0.5;
      const confidence = Math.floor(Math.random() * 40 + 60);
      document.getElementById('signal-display').innerHTML = `
        <div class="signal-indicator ${signal ? '' : 'bearish'}">
          <div class="signal-text">
            <div class="signal-label">${signal ? '🟢 BULLISH' : '🔴 BEARISH'}</div>
            <div class="signal-value">EMA9 > EMA21 | RSI in Zone</div>
          </div>
          <div class="signal-strength">${confidence}%</div>
        </div>
      `;

      // Sample metrics
      document.getElementById('metric-ema9').textContent = asset.price.toFixed(2);
      document.getElementById('metric-ema21').textContent = (asset.price * 0.98).toFixed(2);
      document.getElementById('metric-rsi').textContent = Math.floor(Math.random() * 60 + 30);
      document.getElementById('metric-atr').textContent = (asset.price * 0.01).toFixed(2);
      document.getElementById('metric-high').textContent = `$${(asset.price * 1.05).toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
      document.getElementById('metric-low').textContent = `$${(asset.price * 0.95).toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
    }

    function closeModal() {
      document.getElementById('chart-modal').classList.remove('active');
      selectedAsset = null;
    }

    function changeTF(btn, tf) {
      document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function openPosition(type) {
      alert(`${type === 'buy' ? '🟢 BUY' : '🔴 SELL'} signal on ${selectedAsset}\n\nEntry Price: $${assets[selectedAsset].price.toFixed(2)}\nPosition Size: 1 unit`);
    }

    async function init() {
      await Promise.all([fetchStockQuotes(), fetchCryptoQuotes(), loadPositions()]);
      renderAssets();
      renderPositions();

      const totalValue = Object.entries(positions).reduce((sum, [sym, pos]) => {
        const current = assets[sym + '/USD']?.price || assets[sym]?.price || pos.entry;
        return sum + (current * 1);
      }, 100000);

      const totalPnL = Object.entries(positions).reduce((sum, [sym, pos]) => {
        const current = assets[sym + '/USD']?.price || assets[sym]?.price || pos.entry;
        return sum + (current - pos.entry);
      }, 0);

      document.getElementById('portfolio').textContent = `$${totalValue.toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
      document.getElementById('pnl').classList.toggle('positive', totalPnL >= 0);
      document.getElementById('pnl').classList.toggle('negative', totalPnL < 0);
      document.getElementById('pnl').textContent = `${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)}`;
    }

    init();
    setInterval(init, 5000);

    // Close modal on overlay click
    document.getElementById('chart-modal').addEventListener('click', e => {
      if (e.target.id === 'chart-modal') closeModal();
    });
  </script>
</body>
</html>
