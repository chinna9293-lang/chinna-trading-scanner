<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      color: #e0e6ed;
      line-height: 1.6;
      min-height: 100vh;
    }
    .header {
      background: rgba(15, 20, 31, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 24px; font-weight: 800; color: #6366f1; }
    .header-stats { display: flex; gap: 40px; align-items: center; }
    .stat { text-align: right; }
    .stat-label { font-size: 11px; color: #8b92a9; text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #fff; }
    .stat-value.positive { color: #10b981; }
    .stat-value.negative { color: #ef4444; }
    .container { max-width: 1500px; margin: 0 auto; padding: 24px; }
    .section-header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid rgba(99, 102, 241, 0.2); }
    .section-title { font-size: 18px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; width: 4px; height: 20px; background: #6366f1; border-radius: 2px; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .filter-btn { background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); color: #a5b4fc; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: rgba(26, 31, 44, 0.6); border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.3s ease; }
    .card:hover { background: rgba(26, 31, 44, 0.9); border-color: rgba(99, 102, 241, 0.4); transform: translateY(-2px); }
    .card.active { background: rgba(99, 102, 241, 0.15); border-color: #6366f1; }
    .symbol { font-size: 12px; font-weight: 700; color: #6366f1; text-transform: uppercase; margin-bottom: 6px; }
    .type { font-size: 10px; color: #8b92a9; text-transform: uppercase; margin-bottom: 8px; }
    .price { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .change { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .positive { color: #10b981; }
    .negative { color: #ef4444; }
    .position-card { background: rgba(26, 31, 44, 0.6); border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .position-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(99, 102, 241, 0.1); }
    .pos-sym { font-size: 13px; font-weight: 700; color: #6366f1; text-transform: uppercase; }
    .pos-pnl { font-size: 13px; font-weight: 700; }
    .pos-detail { display: flex; justify-content: space-between; font-size: 12px; color: #8b92a9; margin-bottom: 4px; }
    .pos-value { color: #e0e6ed; font-weight: 600; }
    .empty { color: #8b92a9; padding: 40px; text-align: center; }
    .loading { opacity: 0.5; }
    .error { color: #ef4444; }
    @media (max-width: 768px) {
      .container { padding: 16px; }
      .header-stats { gap: 20px; font-size: 14px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⬡ Trading Bot</div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-label">Portfolio</div>
        <div class="stat-value" id="portfolio">Loading...</div>
      </div>
      <div class="stat">
        <div class="stat-label">Today P&L</div>
        <div class="stat-value" id="pnl">Loading...</div>
      </div>
      <div class="stat">
        <div class="stat-label">Positions</div>
        <div class="stat-value" id="pos-count">0</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section-header">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div class="section-title">📊 All Assets</div>
        <div class="controls">
          <button class="filter-btn active" onclick="filterAssets('all')">All</button>
          <button class="filter-btn" onclick="filterAssets('stock')">Stocks</button>
          <button class="filter-btn" onclick="filterAssets('crypto')">Crypto</button>
        </div>
      </div>
    </div>
    <div class="grid" id="assets-grid"></div>

    <div class="section-header">
      <div class="section-title">💼 Open Positions</div>
    </div>
    <div id="positions-container"></div>
  </div>

  <script>
    const ALP_KEY = 'PK3VYJM2GDKUMCAICARZNBDBDX';
    const ALP_SEC = '6tRAaKznU9XXKVpMNP1FrKBi228FeSbTdbLD8HGk9Zx2';
    const ALP_URL = 'https://paper-api.alpaca.markets';
    const DATA_URL = 'https://data.alpaca.markets';

    const STOCKS = ['COST', 'TSLA', 'META', 'GOOGL', 'AMZN', 'MSFT', 'NVDA', 'AAPL', 'NFLX'];
    const CRYPTOS = ['BTC/USD', 'ETH/USD', 'SOL/USD', 'XRP/USD', 'ADA/USD', 'DOGE/USD'];

    let assets = {};
    let positions = {};
    let currentFilter = 'all';

    async function fetchStockQuotes() {
      try {
        const response = await fetch(
          `${ALP_URL}/v2/stocks/snapshots?symbols=${STOCKS.join(',')}`,
          { headers: { 'APCA-API-KEY-ID': ALP_KEY, 'APCA-API-SECRET-KEY': ALP_SEC } }
        );
        if (!response.ok) throw new Error('Stock API error');
        const data = await response.json();

        STOCKS.forEach(sym => {
          if (data[sym]?.latestTrade) {
            assets[sym] = {
              symbol: sym,
              type: 'stock',
              price: data[sym].latestTrade.p,
              change: 0
            };
          }
        });
      } catch (e) {
        console.log('Stock quote error:', e.message);
      }
    }

    async function fetchCryptoQuotes() {
      try {
        const response = await fetch(
          `${DATA_URL}/v1beta3/crypto/us/latest/quotes?symbols=${CRYPTOS.map(s => s.split('/')[0]).join(',')}`,
          { headers: { 'APCA-API-KEY-ID': ALP_KEY, 'APCA-API-SECRET-KEY': ALP_SEC } }
        );
        if (!response.ok) throw new Error('Crypto API error');
        const data = await response.json();

        if (data.quotes) {
          data.quotes.forEach(quote => {
            const sym = quote.symbol + '/USD';
            if (CRYPTOS.includes(sym)) {
              assets[sym] = {
                symbol: sym,
                type: 'crypto',
                price: quote.ap || quote.bp,
                change: 0
              };
            }
          });
        }
      } catch (e) {
        console.log('Crypto quote error:', e.message);
      }
    }

    async function loadPositions() {
      try {
        const response = await fetch('positions.json');
        if (response.ok) {
          positions = await response.json();
        }
      } catch (e) {
        console.log('Positions load error:', e.message);
      }
    }

    function renderAssets() {
      const filtered = Object.values(assets).filter(a =>
        currentFilter === 'all' || a.type === currentFilter
      );

      const html = filtered.map(asset => `
        <div class="card">
          <div class="symbol">${asset.symbol}</div>
          <div class="type">${asset.type}</div>
          <div class="price">$${asset.price.toLocaleString(undefined, { maximumFractionDigits: 2 })}</div>
          <div class="change">
            <span>${asset.change >= 0 ? '↑' : '↓'}</span>
            <span class="${asset.change >= 0 ? 'positive' : 'negative'}">${asset.change > 0 ? '+' : ''}${asset.change.toFixed(2)}%</span>
          </div>
        </div>
      `).join('');

      document.getElementById('assets-grid').innerHTML = html || '<div class="empty">Loading prices...</div>';
    }

    function renderPositions() {
      const html = Object.entries(positions).map(([sym, pos]) => {
        const current = assets[sym + '/USD']?.price || assets[sym]?.price || pos.entry;
        const pnl = current - pos.entry;
        const pnlPct = ((pnl / pos.entry) * 100).toFixed(2);

        return `
          <div class="position-card">
            <div class="position-header">
              <div class="pos-sym">${sym}</div>
              <div class="pos-pnl ${pnl >= 0 ? 'positive' : 'negative'}">
                ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}
              </div>
            </div>
            <div class="pos-detail"><span>Entry:</span><span class="pos-value">$${pos.entry.toLocaleString()}</span></div>
            <div class="pos-detail"><span>Current:</span><span class="pos-value">$${current.toLocaleString(undefined, { maximumFractionDigits: 2 })}</span></div>
            <div class="pos-detail"><span>SL:</span><span class="pos-value">$${pos.sl.toLocaleString(undefined, { maximumFractionDigits: 2 })}</span></div>
            <div class="pos-detail"><span>TP:</span><span class="pos-value">$${pos.tp.toLocaleString(undefined, { maximumFractionDigits: 2 })}</span></div>
            <div class="pos-detail"><span>Return:</span><span class="pos-value ${pnlPct >= 0 ? 'positive' : 'negative'}">${pnlPct >= 0 ? '+' : ''}${pnlPct}%</span></div>
          </div>
        `;
      }).join('');

      const container = document.getElementById('positions-container');
      container.innerHTML = html || '<div class="empty">No open positions</div>';
      document.getElementById('pos-count').textContent = Object.keys(positions).length;
    }

    function filterAssets(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
      renderAssets();
    }

    async function init() {
      await Promise.all([fetchStockQuotes(), fetchCryptoQuotes(), loadPositions()]);
      renderAssets();
      renderPositions();

      // Calculate portfolio value
      const totalValue = Object.entries(positions).reduce((sum, [sym, pos]) => {
        const current = assets[sym + '/USD']?.price || assets[sym]?.price || pos.entry;
        return sum + (current * 1); // Assuming 1 unit per position
      }, 100000);

      const totalPnL = Object.entries(positions).reduce((sum, [sym, pos]) => {
        const current = assets[sym + '/USD']?.price || assets[sym]?.price || pos.entry;
        return sum + (current - pos.entry);
      }, 0);

      document.getElementById('portfolio').textContent = `$${totalValue.toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
      document.getElementById('pnl').classList.toggle('positive', totalPnL >= 0);
      document.getElementById('pnl').classList.toggle('negative', totalPnL < 0);
      document.getElementById('pnl').textContent = `${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)}`;
    }

    init();
    setInterval(init, 5000); // Refresh every 5 seconds
  </script>
</body>
</html>
