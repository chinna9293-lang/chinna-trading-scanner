name: Scalp Scanner (1-Minute Signals)

on:
  schedule:
    # All times are UTC. US EDT = UTC-4, EST = UTC-5.
    - cron: '*/1 13-20 * * 1-5'  # Every minute, 9 AM - 4 PM ET (13:00-20:59 UTC), Mon-Fri
    - cron: '*/5 20-23 * * 1-5'  # Every 5 minutes, 4 PM - 7:59 PM ET extended hours (20:00-23:59 UTC)
  workflow_dispatch:

jobs:
  scalp_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Scan for 1-Minute Scalp Signals
        run: node scalp-scanner.js
        env:
          NTFY_TOPIC:    ${{ secrets.NTFY_TOPIC }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
      - name: Log Scan Results
        if: always()
        run: echo "Scalp scan completed at $(date)"
