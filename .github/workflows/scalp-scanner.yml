name: Scalp Scanner (5-Minute Signals)

on:
  schedule:
    # Run 24/7 for crypto + stocks (crypto trades 24/7, stocks during market hours)
    # Every 5 minutes, all day, every day
    - cron: '*/5 * * * *'  # Every 5 minutes, 24/7/365
  workflow_dispatch:

jobs:
  scalp_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Scan for 1-Minute Scalp Signals
        run: node scalp-scanner.js
        env:
          NTFY_TOPIC:    ${{ secrets.NTFY_TOPIC }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}

      - name: Commit Updated Signals
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/signals.json; then
            echo "No signal changes to commit"
          else
            git add docs/signals.json
            git commit -m "Update signals.json from latest scan - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log Scan Results
        if: always()
        run: echo "Scalp scan completed at $(date)"
