name: Scalp Scanner (5-Minute Signals)

on:
  schedule:
    # Run every 5 minutes during market hours (9:30 AM - 4:00 PM ET = 1:30 PM - 8:00 PM UTC)
    # GitHub Actions cron uses UTC time!
    - cron: '*/5 13-20 * * 1-5'  # Every 5 minutes, 1:30 PM - 8:00 PM UTC (9:30 AM - 4:00 PM ET), Mon-Fri
  workflow_dispatch:

jobs:
  scalp_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Scan for 1-Minute Scalp Signals
        run: node scalp-scanner.js
        env:
          NTFY_TOPIC:    ${{ secrets.NTFY_TOPIC }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
      - name: Log Scan Results
        if: always()
        run: echo "Scalp scan completed at $(date)"
