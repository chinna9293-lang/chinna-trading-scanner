name: News to Instagram

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  post_news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install fonts (for image text rendering)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate news image
        run: node scripts/generate-news-image.mjs

      - name: Commit and push generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/instagram
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Instagram news image - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi

      - name: Post to Instagram
        run: node scripts/post-to-instagram.mjs
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
